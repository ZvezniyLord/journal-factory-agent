    development_plan_path: "cores/llm_core/DEVELOPMENT_PLAN.md"
    acceptance_outline:
      - "Exposes one typed LLM Core port; no other core embeds or invokes model runtimes directly."
      - "Supports LM Studio, Ollama native, Ollama OpenAI-compatible, and explicitly configured OpenAI-compatible endpoints through replaceable adapters."
      - "Discovers only a deterministic allowlist of configured, local, Docker service, host.docker.internal, and Docker-gateway endpoints; broad network scanning is forbidden."
      - "Performs DNS, TCP, HTTP, API, model-list, inference, and structured-JSON checks with normalized results and masked secrets."
      - "Uses deterministic provider/model priority, bounded retries, cooldown/circuit-breaking, and explicit fallback provenance."
      - "Works for host-to-host, container-to-host, host-to-container, and same-network Compose deployments without hard-coded magic IP addresses."
      - "Provides unit tests with HTTP mocks, separate integration smoke tests, Docker Compose validation, machine-readable diagnostics, and real-run evidence."
      - "Does not download large models or expose services externally without explicit user approval."
