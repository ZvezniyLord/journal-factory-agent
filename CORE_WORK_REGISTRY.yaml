    description: "Separate callable reasoning service that discovers and validates local or containerized model runtimes, normalizes structured requests and responses, applies bounded retry and fallback policy, and records provenance."
    roadmap_reference: "docs/CORE_DEVELOPMENT_PROTOCOL.md#core-architecture-separation"
