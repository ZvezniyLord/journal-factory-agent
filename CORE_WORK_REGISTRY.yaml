    development_case: "Build the provider-neutral LLM integration boundary for LM Studio, Ollama native API, Ollama OpenAI-compatible API, Docker-host and Docker-network connectivity, custom OpenAI-compatible endpoints, deterministic endpoint discovery, model selection, health checks, structured JSON validation, bounded retry/fallback, diagnostics, security, and provenance."
