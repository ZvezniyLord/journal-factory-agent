    display_name: "Dashboard Core"
    description: "Operational execution center that creates or restores runs, requests source discovery and candidate location through ports, submits work to Orchestrator Core, and projects live run state for browser adapters."
    roadmap_reference: "docs/CORE_DEVELOPMENT_PROTOCOL.md#core-architecture-separation"
