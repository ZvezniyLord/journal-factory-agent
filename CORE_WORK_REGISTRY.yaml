schema_version: 1
registry_rules:
  source_of_truth: CORE_WORK_REGISTRY.yaml
  lock_field: in_progress
  free_value: false
  locked_value: true
  read_when_locked: true
  modify_when_locked: false
  claim_requires_fresh_main: true
  release_required_after_work: true
  stale_lock_policy: "Do not clear another agent's lock automatically. Mark the situation BLOCKED and ask the user unless the lock owner explicitly releases it or the user authorizes recovery."
  atomic_claim_protocol:
    - "Fetch origin/main and verify the local branch is current."
    - "Read this complete file immediately before claiming."
    - "Confirm the selected core has in_progress: false."
    - "Set in_progress: true and fill lock_owner, lock_session, claimed_at_utc, branch, work_item, and allowed_write_scope."
    - "Commit and push the claim before modifying implementation files."
    - "Fetch origin/main again and verify the pushed registry still names this session as owner."
    - "If the claim conflicts or another owner appears, stop with BLOCKED and do not modify that core."
  release_protocol:
    - "Run focused tests, the full test suite, real-run checks, artifact inspection, architecture review, and repository acceptance."
    - "Update last_result, last_commit, notes, and completed_at_utc."
    - "Set in_progress: false and clear lock_owner, lock_session, claimed_at_utc, branch, work_item, and allowed_write_scope."
    - "Commit and push the release as the final action of the work cycle."
    - "Verify origin/main contains in_progress: false for the released core."
  failure_protocol:
    - "When work is interrupted, do not silently leave the lock ambiguous."
    - "Record status: blocked or interrupted, explain the reason in notes, and keep or release the lock according to user instruction."
    - "Never clear a lock owned by another chat merely because it appears old."

