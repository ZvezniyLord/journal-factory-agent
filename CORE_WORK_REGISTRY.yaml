    development_case: "Build the Phase 1 dashboard application-service foundation with explicit ports and deterministic test adapters for unavailable cores, without owning root HTML or Orchestrator implementation."
    depends_on:
      - workspace_driver
      - orchestrator_core
    passport_path: "cores/dashboard_core/CORE.md"
    development_plan_path: "cores/dashboard_core/DEVELOPMENT_PLAN.md"
    acceptance_outline:
      - "Accepts source folder, output folder, and journal number through a typed run request."
      - "Creates or restores runs only through Workspace Driver and dashboard persistence ports."
      - "Requests recursive discovery and Excel/article candidate location through dedicated ports."
      - "Submits typed work to Orchestrator Core without implementing Orchestrator transitions or downstream domain logic."
      - "Projects per-core state, progress, warnings, reports, files, final results, and structured failures for browser adapters."
      - "Recovers persisted dashboard state after process restart."
      - "Uses deterministic test adapters for unavailable cores and demonstrates a real loopback backend run with temporary folders."
    status: in_progress
    in_progress: true
    lock_owner: "codex-root-dashboard"
    lock_session: "dashboard-core-20260719T202651Z-019f7c08"
    claimed_at_utc: "2026-07-19T20:26:51Z"
