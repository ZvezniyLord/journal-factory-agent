name: Conference cycle tests

on:
  pull_request:
    paths:
      - "journal_factory/corpus_*.py"
      - "journal_factory/cli.py"
      - "tests/test_corpus_*.py"
      - "requirements.txt"
      - ".github/workflows/conference-cycle-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile modules
        run: python -m compileall -q journal_factory
      - name: Run corpus tests
        run: python -m pytest -q tests/test_corpus_archive.py tests/test_corpus_alignment.py
